<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../app.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body x-data="page">
    <div class="card" style="text-align: center; padding: 24px;">
        <div style="font-size: 48px; margin-bottom: 12px;">&#x1F464;</div>
        <div style="font-size: 18px; font-weight: 600;" x-text="store.username"></div>
        <div style="font-size: 13px; color: #8e8e93; margin-top: 4px;" x-text="$t('profile.role')"></div>
    </div>

    <div class="card">
        <div class="card-title" x-text="$t('profile.navAPIs')"></div>
        <p style="font-size: 13px; color: #666; margin-bottom: 12px;" x-text="store.navInfo"></p>
        <button class="btn btn-secondary" @click="onSwitchToList" x-text="$t('profile.switchList')"></button>
        <button class="btn btn-secondary" @click="onReLaunch" x-text="$t('profile.reLaunchHome')"></button>
    </div>
</body>
</html>
