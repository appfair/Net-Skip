<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../../app.css">
    <link rel="stylesheet" href="list.css">
</head>
<body x-data="page">
    <div class="card" style="padding: 0; overflow: hidden;">
        <template x-for="item in store.items">
            <div class="list-item" @click="onItemTap({ id: item.id })">
                <div>
                    <div class="list-item-title" x-text="item.title"></div>
                    <div class="list-item-subtitle" x-text="item.desc"></div>
                </div>
                <div class="list-item-arrow">&rsaquo;</div>
            </div>
        </template>
    </div>
</body>
</html>
